<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BS Textile | Кириш</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root{
      --bg: #F8F5F0;
      --deep: #1E4A54;
      --accent: #2AA7A1;
      --accent-light: #52D6C9;
      --warm: #D4A574;
      --warm-light: #F0D8B8;
      --text: #2C3E50;
      --text-light: #697777;

      --glass: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(255, 255, 255, 0.3);
      --shadow-soft: 0 25px 60px rgba(30, 74, 84, 0.08);
      --shadow-deep: 0 35px 80px rgba(30, 74, 84, 0.12);

      --gradient-primary: linear-gradient(135deg, var(--accent) 0%, var(--deep) 100%);
      --gradient-warm: linear-gradient(135deg, var(--warm) 0%, #E8C39E 100%);
      --gradient-bg: linear-gradient(135deg, #F8F5F0 0%, #F0EBE3 100%);
    }

{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--gradient-bg);
      color: var(--text);
      position: relative;
      overflow-x: hidden;
    }

    /* Animated Background */
    .fabric-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(42, 167, 161, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(212, 165, 116, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 40% 80%, rgba(30, 74, 84, 0.05) 0%, transparent 50%);
    }

    .threads {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.4;
    }

    .thread {
      position: absolute;
      width: 2px;
      height: 100%;
      background: linear-gradient(to bottom, 
        transparent, 
        var(--accent-light), 
        var(--warm), 
        transparent);
      animation: thread-float 15s linear infinite;
      filter: blur(0.5px);
    }

    @keyframes thread-float {
      0% {
        transform: translateY(-100%) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(100%) rotate(360deg);
        opacity: 0;
      }
    }

    /* Fabric Pattern */
    .fabric-pattern {
      position: fixed;
      inset: 0;
      background-image: 
        repeating-linear-gradient(0deg, 
          transparent, 
          transparent 2px, 
          rgba(42, 167, 161, 0.03) 2px, 
          rgba(42, 167, 161, 0.03) 4px),
        repeating-linear-gradient(90deg, 
          transparent, 
          transparent 2px, 
          rgba(212, 165, 116, 0.03) 2px, 
          rgba(212, 165, 116, 0.03) 4px);
      background-size: 40px 40px;
      z-index: 1;
      opacity: 0.4;
    }

    /* Floating Needles */
    .needles {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .needle {
      position: absolute;
      width: 60px;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--deep), transparent);
      border-radius: 2px;
      animation: needle-float 20s linear infinite;
      opacity: 0.3;
    }

    .needle::before {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }

    @keyframes needle-float {
      0% {
        transform: translateX(-100px) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.3;
      }
      90% {
        opacity: 0.3;
      }
      100% {
        transform: translateX(calc(100vw + 100px)) rotate(360deg);
        opacity: 0;
      }
    }

    /* Main Container */
    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      max-width: 550px;         /* was 480px */
      border-radius: 30px;
      width: 100%;

      background: var(--glass);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      border: 1px solid var(--glass-border);
      box-shadow: 
        var(--shadow-soft),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      overflow: hidden;
      position: relative;
      animation: card-appear 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      transform-origin: center;
    }

    @keyframes card-appear {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .login-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(600px at 30% 0%, rgba(42, 167, 161, 0.1), transparent 50%),
        radial-gradient(600px at 70% 100%, rgba(212, 165, 116, 0.1), transparent 50%);
      z-index: -1;
    }

    .card-header {
      padding: 32px 32px 24px;
      position: relative;
      overflow: hidden;
    }

    .header-decoration {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--gradient-primary);
      animation: width-pulse 3s ease-in-out infinite;
    }

    @keyframes width-pulse {
      0%, 100% {
        transform: scaleX(0.8);
        opacity: 0.8;
      }
      50% {
        transform: scaleX(1);
        opacity: 1;
      }
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .logo-container {
      position: relative;
      width: 60px;
      height: 60px;
    }
    .logo-img{
          width: 85%;   /* e.g. 60% / 70% / 90% */
          height: 85%;
          object-fit: contain;
        }

    .logo {
      width: 100%;
      height: 100%;
      background: var(--gradient-primary);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow: 
        0 10px 30px rgba(42, 167, 161, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    .logo::before {
      content: '';
      position: absolute;
      inset: 1px;
      background: var(--gradient-warm);
      border-radius: 15px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }



    .logo i {
      font-size: 28px;
      color: white;
      position: relative;
      z-index: 2;
      animation: needle-stitch 2s ease-in-out infinite;
    }

    @keyframes needle-stitch {
      0%, 100% {
        transform: translateX(0) rotate(0deg);
      }
      25% {
        transform: translateX(2px) rotate(5deg);
      }
      75% {
        transform: translateX(-2px) rotate(-5deg);
      }
    }

    .logo-glow {
      position: absolute;
      inset: -10px;
      background: var(--gradient-primary);
      border-radius: 26px;
      filter: blur(15px);
      opacity: 0.5;
      animation: glow-pulse 3s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%, 100% {
        opacity: 0.3;
        transform: scale(0.95);
      }
      50% {
        opacity: 0.5;
        transform: scale(1.05);
      }
    }

    .brand-text h1 {
        text-align: center;
      font-size: 30px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--deep), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }

    .brand-text p {
      color: var(--text-light);
      font-size: 14px;
      font-weight: 500;
    }

    .welcome-text {
      text-align: center;
      margin-bottom: 8px;
    }

    .welcome-text h2 {
      font-size: 28px;
      font-weight: 700;
      color: var(--deep);
      margin-bottom: 8px;
      position: relative;
      display: inline-block;
    }

    .welcome-text h2::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: var(--gradient-warm);
      border-radius: 2px;
      animation: width-grow 2s ease-in-out infinite;
    }

    @keyframes width-grow {
      0%, 100% {
        width: 60px;
      }
      50% {
        width: 100px;
      }
    }

    .welcome-text p {
      color: var(--text-light);
      font-size: 15px;
      line-height: 1.5;
    }

    .card-body {
      padding: 0 32px 32px;
    }

    /* Code Input */
    .code-input-section {
      margin-bottom: 32px;
    }

    .code-display-wrapper {
      position: relative;
      margin-bottom: 16px;
    }

    .code-display {
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid rgba(42, 167, 161, 0.1);
      border-radius: 20px;
      padding: 28px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .code-display::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 30% 30%, rgba(42, 167, 161, 0.05), transparent 50%),
        radial-gradient(circle at 70% 70%, rgba(212, 165, 116, 0.05), transparent 50%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .code-display:focus-within {
      border-color: var(--accent);
      box-shadow: 
        0 0 0 4px rgba(42, 167, 161, 0.1),
        0 20px 40px rgba(30, 74, 84, 0.1);
      transform: translateY(-2px);
    }

    .code-display:focus-within::before {
      opacity: 1;
    }

    .code-dots {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 20px;
    }

    .code-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(105, 119, 119, 0.15);
      position: relative;
      transition: all 0.3s ease;
      transform-origin: center;
    }

    .code-dot.filled {
      background: var(--gradient-primary);
      animation: dot-fill 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
      box-shadow: 
        0 0 0 4px rgba(42, 167, 161, 0.15),
        0 8px 20px rgba(42, 167, 161, 0.2);
    }

    @keyframes dot-fill {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      70% {
        transform: scale(1.2);
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .code-dot.filled::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid var(--accent-light);
      opacity: 0;
      animation: ripple 1.5s ease-out infinite;
    }

    @keyframes ripple {
      0% {
        transform: scale(0.8);
        opacity: 0.5;
      }
      100% {
        transform: scale(2);
        opacity: 0;
      }
    }

    .code-text {
      text-align: center;
      font-size: 18px;
      letter-spacing: 8px;
      font-weight: 600;
      color: rgba(44, 62, 80, 0.6);
      font-variant-numeric: tabular-nums;
      padding: 0 10px;
    }

    .input-hint {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-light);
      font-size: 14px;
      padding: 0 8px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      position: relative;
      animation: status-pulse 2s ease-in-out infinite;
    }

    @keyframes status-pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(42, 167, 161, 0.7);
      }
      50% {
        transform: scale(1.2);
        box-shadow: 0 0 0 6px rgba(42, 167, 161, 0);
      }
    }

    /* Keypad */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .key {
      aspect-ratio: 1;
      border: none;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--deep);
      font-size: 22px;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.2s ease;
      box-shadow: 
        0 8px 25px rgba(30, 74, 84, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(42, 167, 161, 0.1);
    }

    .key::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gradient-primary);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .key:hover {
      transform: translateY(-2px);
      box-shadow: 
        0 15px 35px rgba(30, 74, 84, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      border-color: var(--accent-light);
    }

    .key:hover::before {
      opacity: 0.1;
    }

    .key:active {
      transform: translateY(1px) scale(0.98);
      box-shadow: 
        0 5px 20px rgba(30, 74, 84, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .key span {
      position: relative;
      z-index: 1;
    }

    .key-clear, .key-back {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .key-clear {
      color: #E74C3C;
    }

    .key-back {
      color: var(--accent);
    }

    /* Submit Button */
    .submit-section {
      margin-bottom: 24px;
    }

    .submit-btn {
      width: 100%;
      padding: 20px;
      border: none;
      border-radius: 18px;
      background: var(--gradient-primary);
      color: white;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 
        0 15px 40px rgba(42, 167, 161, 0.3),
        0 5px 15px rgba(30, 74, 84, 0.2);
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.3),
        transparent
      );
      transition: left 0.6s ease;
    }

    .submit-btn:hover::before {
      left: 100%;
    }

    .submit-btn:hover {
      transform: translateY(-3px);
      box-shadow: 
        0 20px 50px rgba(42, 167, 161, 0.4),
        0 10px 25px rgba(30, 74, 84, 0.25);
    }

    .submit-btn:active {
      transform: translateY(-1px);
    }

    .btn-text {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    /* Footer */
    .card-footer {
      padding: 20px 32px;
      border-top: 1px solid rgba(42, 167, 161, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-light);
      font-size: 14px;
      background: rgba(255, 255, 255, 0.5);
    }

    .factory-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(212, 165, 116, 0.1);
      border-radius: 12px;
      border: 1px solid rgba(212, 165, 116, 0.2);
    }

    .factory-badge i {
      color: var(--warm);
    }

    /* Flash Message */
    .flash-message {
      margin-top: 16px;
      padding: 14px 18px;
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid rgba(231, 76, 60, 0.2);
      border-radius: 14px;
      color: #C0392B;
      font-size: 14px;
      animation: slide-in 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .flash-message i {
      font-size: 16px;
    }

    @keyframes slide-in {
      0% {
        opacity: 0;
        transform: translateX(-20px);
      }
      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Hidden Input */
    #codeInput {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    /* Loading Animation */
    .loader {
      display: none;
      width: 40px;
      height: 40px;
      margin: 0 auto;
      position: relative;
    }

    .loader.active {
      display: block;
    }

    .loader::before,
    .loader::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
    }

    .loader::after {
      border-top-color: var(--warm);
      animation-delay: 0.3s;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card {
        border-radius: 24px;
      }

      .card-header,
      .card-body {
        padding: 24px;
      }

      .keypad {
        gap: 12px;
      }

      .key {
        font-size: 20px;
      }

      .code-dots {
        gap: 20px;
      }
    }
    /* ===============================
   1920×1080 (киоск/ПК): wide + low
   =============================== */
    @media (min-width: 1200px) and (min-height: 700px){

      /* container offset to avoid column effect */
      .container{
        padding: 26px 48px;
        align-items: center;
      }

      /* Card: wider, lower, no extra vertical space */

      .brand{
        margin-bottom: 5px; /* was 24 */
      }

      .welcome-text{
        text-align: left;    /* better readability on wide screen */
        margin-bottom: 0;
      }

      .welcome-text h2{
        font-size: 30px;
      }

      .welcome-text p{
        max-width: 48ch;
        font-size: 15px;
      }

      /* Body right: compact, no extra height */
      .card-body{
        padding: 26px 34px 18px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .code-input-section{
        margin-bottom: 18px; /* was 32 */
      }

      .code-display{
        padding: 18px;       /* was 28 */
        border-radius: 18px;
      }

      .code-dots{
        gap: 18px;           /* was 24 */
        margin-bottom: 14px; /* was 20 */
      }

      /* Keypad: kiosk style — shorter, wider */
      .keypad{
        gap: 14px;          /* was 16 */
        margin-bottom: 16px;/* was 24 */
      }

      .key{
        aspect-ratio: auto;   /* was 1 */
        height: 72px;         /* fixed height for 1080p */
        border-radius: 18px;
        font-size: 22px;
      }

      .key-clear, .key-back{
        font-size: 16px;
      }

      /* Login button more compact */
      .submit-section{
        margin-bottom: 0;
      }

      .submit-btn{
        padding: 18px;      /* was 20 */
        border-radius: 18px;
        font-size: 16px;
      }

      /* Footer full width at bottom */
      .card-footer{
        grid-column: 1 / -1;
        padding: 16px 34px; /* было 20 32 */
      }
    }

  </style>
</head>

<body>
  <!-- Background Elements -->
  <div class="fabric-bg"></div>
  <div class="fabric-pattern"></div>

  <!-- Threads -->
  <div class="threads" id="threads"></div>

  <!-- Needles -->
  <div class="needles" id="needles"></div>

  <!-- Main Container -->
  <div class="container">
    <div class="login-card">
      <div class="card-header">
        <div class="header-decoration"></div>

        <div class="brand">
          <div class="logo-container">
            <div class="logo-glow"></div>
            <div class="logo">
              <img src="{{ url_for('static', filename='logo.png') }}" alt="BS Textile" class="logo-img">
            </div>

          </div>

        </div>
        <div class="brand-text">
            <h1>BS TEXTILE</h1>

        </div>


      </div>

      <div class="card-body">
        <form id="loginForm" method="post" action="/login" autocomplete="off">
          <div class="code-input-section">
            <input id="codeInput" name="code" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" required />

            <div class="code-display-wrapper">
              <div class="code-display" id="codeDisplay" tabindex="0">
                <div class="code-dots">
                  <div class="code-dot" id="dot1"></div>
                  <div class="code-dot" id="dot2"></div>
                  <div class="code-dot" id="dot3"></div>
                  <div class="code-dot" id="dot4"></div>
                </div>
                <div class="code-text" id="codeText">••••</div>
              </div>

              <div class="loader" id="loader"></div>
            </div>

            <div class="input-hint">
              <span>4 рақам</span>
              <div class="status-indicator">
                <div class="status-dot"></div>
                <span id="statusText">Тайёр</span>
              </div>
            </div>
          </div>

          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              {% for category, message in messages %}
                <div class="flash-message">
                  <i class="fas fa-exclamation-circle"></i>
                  {{ message }}
                </div>
              {% endfor %}
            {% endif %}
          {% endwith %}

          <div class="keypad">
            <button class="key" type="button" data-key="1"><span>1</span></button>
            <button class="key" type="button" data-key="2"><span>2</span></button>
            <button class="key" type="button" data-key="3"><span>3</span></button>
            <button class="key" type="button" data-key="4"><span>4</span></button>
            <button class="key" type="button" data-key="5"><span>5</span></button>
            <button class="key" type="button" data-key="6"><span>6</span></button>
            <button class="key" type="button" data-key="7"><span>7</span></button>
            <button class="key" type="button" data-key="8"><span>8</span></button>
            <button class="key" type="button" data-key="9"><span>9</span></button>

            <button class="key key-clear" type="button" id="clearBtn">
              <i class="fas fa-eraser"></i>

            </button>
            <button class="key" type="button" data-key="0"><span>0</span></button>
            <button class="key key-back" type="button" id="backBtn">
              <i class="fas fa-backspace"></i>

            </button>
          </div>

          <div class="submit-section">
            <button class="submit-btn" type="submit" id="submitBtn">
              <div class="btn-text">
                <i class="fas fa-sign-in-alt"></i>
                <span id="btnText">Тизимга кириш</span>
              </div>
            </button>
          </div>
        </form>
      </div>

      <div class="card-footer">
        <div class="factory-badge">
          <i class="fas fa-industry"></i>
          <span>Ишлаб чиқариш линияси</span>
        </div>
        <span>Версия 2.0</span>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Create threads
      const threadsContainer = document.getElementById('threads');
      for (let i = 0; i < 15; i++) {
        const thread = document.createElement('div');
        thread.className = 'thread';
        thread.style.left = `${Math.random() * 100}%`;
        thread.style.animationDelay = `${Math.random() * 15}s`;
        thread.style.animationDuration = `${10 + Math.random() * 10}s`;
        threadsContainer.appendChild(thread);
      }

      // Create needles
      const needlesContainer = document.getElementById('needles');
      for (let i = 0; i < 8; i++) {
        const needle = document.createElement('div');
        needle.className = 'needle';
        needle.style.top = `${Math.random() * 100}%`;
        needle.style.animationDelay = `${Math.random() * 20}s`;
        needle.style.animationDuration = `${15 + Math.random() * 15}s`;
        needlesContainer.appendChild(needle);
      }

      // Elements
      const codeInput = document.getElementById('codeInput');
      const codeDisplay = document.getElementById('codeDisplay');
      const dots = [
        document.getElementById('dot1'),
        document.getElementById('dot2'),
        document.getElementById('dot3'),
        document.getElementById('dot4')
      ];
      const codeText = document.getElementById('codeText');
      const statusText = document.getElementById('statusText');
      const loader = document.getElementById('loader');
      const submitBtn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const form = document.getElementById('loginForm');

      // Update display
      function updateDisplay() {
        const value = codeInput.value || '';
        const digits = value.split('');

        // Update dots with animation
        dots.forEach((dot, index) => {
          if (index < digits.length) {
            if (!dot.classList.contains('filled')) {
              dot.classList.add('filled');
            }
          } else {
            dot.classList.remove('filled');
          }
        });

        // Update text
        const displayText = value.padEnd(4, '•');
        codeText.textContent = displayText;

        // Update status
        if (value.length === 0) {
          statusText.textContent = 'Тайёр';
        } else if (value.length < 4) {
          statusText.textContent = 'Киритилмоқда...';
        } else {
          statusText.textContent = 'Текширилмоқда...';
          btnText.textContent = 'Тасдиқлaнмоқда...';

          // Auto-submit after short delay
          setTimeout(() => {
            if (codeInput.value.length === 4) {
              submitForm();
            }
          }, 300);
        }
      }

      // Add digit with animation
      function addDigit(digit) {
        if (codeInput.value.length >= 4) return;

        // Add click animation
        const key = document.querySelector(`[data-key="${digit}"]`);
        if (key) {
          key.style.transform = 'translateY(1px) scale(0.95)';
          setTimeout(() => {
            key.style.transform = '';
          }, 150);
        }

        codeInput.value += digit;
        updateDisplay();
      }

      // Backspace
      function backspace() {
        if (codeInput.value.length > 0) {
          codeInput.value = codeInput.value.slice(0, -1);
          updateDisplay();
        }
      }

      // Clear all with animation
      function clearAll() {
        if (codeInput.value.length === 0) return;

        // Add shake animation
        codeDisplay.style.animation = 'shake 0.5s ease';
        setTimeout(() => {
          codeDisplay.style.animation = '';
        }, 500);

        codeInput.value = '';
        updateDisplay();
      }

      // Submit form
      function submitForm() {
        if (codeInput.value.length !== 4) return;

        loader.classList.add('active');
        submitBtn.disabled = true;
        btnText.textContent = 'Код текширилмоқда...';

        // Add loading animation to dots
        dots.forEach(dot => {
          if (dot.classList.contains('filled')) {
            dot.style.animation = 'dot-fill 0.4s ease infinite';
          }
        });

        // Simulate server check animation
        setTimeout(() => {
          form.submit();
        }, 800);
      }

      // Event Listeners
      document.querySelectorAll('[data-key]').forEach(button => {
        button.addEventListener('click', () => {
          addDigit(button.getAttribute('data-key'));
        });
      });

      document.getElementById('backBtn').addEventListener('click', backspace);
      document.getElementById('clearBtn').addEventListener('click', clearAll);

      submitBtn.addEventListener('click', (e) => {
        e.preventDefault();
        submitForm();
      });

      // Keyboard support
      codeDisplay.addEventListener('click', () => codeInput.focus());

      document.addEventListener('keydown', (e) => {
        if (e.key >= '0' && e.key <= '9') {
          addDigit(e.key);
        } else if (e.key === 'Backspace') {
          backspace();
          e.preventDefault();
        } else if (e.key === 'Escape') {
          clearAll();
        } else if (e.key === 'Enter') {
          submitForm();
          e.preventDefault();
        }
      });

      // Input event for paste support
      codeInput.addEventListener('input', updateDisplay);

      // Add ripple effect to keys
      document.querySelectorAll('.key').forEach(key => {
        key.addEventListener('click', function(e) {
          const ripple = document.createElement('span');
          const rect = this.getBoundingClientRect();
          const size = Math.max(rect.width, rect.height);
          const x = e.clientX - rect.left - size / 2;
          const y = e.clientY - rect.top - size / 2;

          ripple.style.cssText = `
            position: absolute;
            border-radius: 50%;
            background: rgba(42, 167, 161, 0.2);
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            width: ${size}px;
            height: ${size}px;
            top: ${y}px;
            left: ${x}px;
            pointer-events: none;
          `;

          this.appendChild(ripple);
          setTimeout(() => ripple.remove(), 600);
        });
      });

      // Add CSS for animations
      const style = document.createElement('style');
      style.textContent = `
        @keyframes ripple-animation {
          to {
            transform: scale(4);
            opacity: 0;
          }
        }

        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
          20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
      `;
      document.head.appendChild(style);

      // Initial update
      updateDisplay();
    });
  </script>
</body>
</html>
